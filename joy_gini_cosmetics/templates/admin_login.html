<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Login - Joy Gini Cosmetics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #4a0e0e 0%, #7a1f1f 50%, #4a0e0e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            border: 2px solid gold;
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .login-card:hover {
            transform: translateY(-3px);
        }
        .store-title {
            text-align: center;
            font-size: 1.8rem;
            color: gold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }
        .sub-title {
            text-align: center;
            color: #ffd966;
            margin-bottom: 30px;
            font-size: 0.9rem;
            border-bottom: 1px solid gold;
            display: inline-block;
            width: auto;
            padding-bottom: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #ffd966;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 18px;
            background: #2c0a0a;
            border: 1px solid gold;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #ffcc00;
            box-shadow: 0 0 8px rgba(255,215,0,0.5);
        }
        button {
            width: 100%;
            padding: 12px;
            background: gold;
            color: #4a0e0e;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #ffcc00;
            transform: scale(1.02);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: gold;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .error-msg {
            background: rgba(220,53,69,0.9);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.7rem;
            color: #ccaa77;
        }
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            .store-title { font-size: 1.5rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="login-card">
    <div class="store-title">
        <i class="fas fa-crown"></i> Joy Gini Cosmetics
    </div>
    <div style="text-align: center;">
        <span class="sub-title">Admin & Staff Access</span>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="error-msg">
                <i class="fas fa-exclamation-triangle"></i> {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" name="email" placeholder="admin@joygini.com" required autofocus>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit"><i class="fas fa-sign-in-alt"></i> Login</button>
    </form>

    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Customer Store</a>
    <footer>© 2026 Joy Gini Cosmetics – Secure Admin Panel</footer>
</div>
</body>
</html>
