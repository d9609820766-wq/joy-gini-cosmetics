<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Change Password - Joy Gini Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #4a0e0e 0%, #7a1f1f 50%, #4a0e0e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid gold;
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: gold;
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin: 12px 0 5px;
            font-weight: bold;
            color: #ffd966;
        }
        input {
            width: 100%;
            padding: 10px 15px;
            background: #2c0a0a;
            border: 1px solid gold;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus {
            border-color: #ffcc00;
            box-shadow: 0 0 5px gold;
        }
        button {
            width: 100%;
            padding: 12px;
            background: gold;
            color: #4a0e0e;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            background: #ffcc00;
            transform: scale(1.02);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: gold;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .flash {
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
        }
        .danger { background: #dc3545; }
        .success { background: #28a745; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="card">
    <h2><i class="fas fa-key"></i> Change Password</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST">
        <label>Current Password</label>
        <input type="password" name="old_password" required>
        <label>New Password (min 4 characters)</label>
        <input type="password" name="new_password" required>
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required>
        <button type="submit"><i class="fas fa-save"></i> Update Password</button>
    </form>
    <a href="/admin/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>
</body>
</html>
