<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sales Report - Joy Gini Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #4a0e0e 0%, #7a1f1f 50%, #4a0e0e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; padding: 20px 0; border-bottom: 2px solid gold;
            margin-bottom: 30px;
        }
        .header h1 { color: gold; }
        .filter-card {
            background: rgba(0,0,0,0.6);
            border: 1px solid gold;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }
        .filter-btn {
            background: #2c0a0a;
            border: 1px solid gold;
            border-radius: 40px;
            padding: 8px 18px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }
        .filter-btn.active {
            background: gold;
            color: #4a0e0e;
            font-weight: bold;
        }
        .date-range {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .date-range input {
            background: #2c0a0a;
            border: 1px solid gold;
            border-radius: 40px;
            padding: 8px 15px;
            color: white;
        }
        .btn {
            background: gold;
            color: #4a0e0e;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-excel {
            background: #28a745;
            color: white;
        }
        table {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border-collapse: collapse;
            border-radius: 15px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid gold;
        }
        th { background: rgba(0,0,0,0.8); color: gold; }
        .grand-total {
            text-align: right;
            margin-top: 20px;
            font-size: 1.3rem;
            color: gold;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        footer { text-align: center; margin-top: 40px; }
        a { color: gold; }
        @media (max-width: 768px) {
            th, td { font-size: 0.8rem; padding: 8px; }
            .filter-buttons { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Sales Report</h1>
        <a href="/admin/dashboard" style="color:gold;">← Dashboard</a>
    </div>

    <div class="filter-card">
        <h3 style="color:gold; margin-bottom:15px;">Filter by Date</h3>
        <div class="filter-buttons">
            <button class="filter-btn" data-period="weekly">📅 Weekly</button>
            <button class="filter-btn" data-period="monthly">📆 Monthly</button>
            <button class="filter-btn" data-period="6months">📊 6 Months</button>
            <button class="filter-btn" data-period="1year">🗓️ 1 Year</button>
            <button class="filter-btn active" data-period="custom">✨ Custom Date</button>
        </div>
        <div class="date-range" id="dateRangeDiv">
            <label>From:</label>
            <input type="date" id="startDate" value="">
            <label>To:</label>
            <input type="date" id="endDate" value="">
            <button class="btn" onclick="loadReport()">Apply</button>
            <button class="btn btn-excel" onclick="downloadExcel()"><i class="fas fa-file-excel"></i> Download Excel</button>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table id="reportTable">
            <thead>
                <tr><th>Product Name</th><th>Unit Price (₹)</th><th>Quantity Sold</th><th>Total Amount (₹)</th></tr>
            </thead>
            <tbody id="reportBody">
                <tr><td colspan="4" class="loading">Loading report...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="grandTotal" class="grand-total"></div>
    <footer>© Joy Gini Cosmetics – Sales Report | Only Completed Orders</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
<script>
    let currentPeriod = 'custom';
    let currentStartDate = '';
    let currentEndDate = '';

    // Set today's date for custom range default
    const today = new Date().toISOString().split('T')[0];
    const lastMonth = new Date();
    lastMonth.setMonth(lastMonth.getMonth() - 1);
    document.getElementById('startDate').value = lastMonth.toISOString().split('T')[0];
    document.getElementById('endDate').value = today;

    function loadReport() {
        const period = currentPeriod;
        let startDate = document.getElementById('startDate').value;
        let endDate = document.getElementById('endDate').value;
        
        let url = `/admin/sales_report_data?period=${period}`;
        if (period === 'custom' && startDate && endDate) {
            url += `&start_date=${startDate}&end_date=${endDate}`;
        }
        
        document.getElementById('reportBody').innerHTML = '<tr><td colspan="4" class="loading">Loading...</td></tr>';
        
        fetch(url)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('reportBody');
                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="loading">No sales data for selected period</td></tr>';
                    document.getElementById('grandTotal').innerHTML = '';
                    return;
                }
                
                let html = '';
                data.data.forEach(item => {
                    html += `
                        <tr>
                            <td>${escapeHtml(item.title)}</td>
                            <td>₹ ${parseFloat(item.price).toFixed(2)}</td>
                            <td>${item.total_quantity}</td>
                            <td>₹ ${parseFloat(item.total_amount).toFixed(2)}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
                document.getElementById('grandTotal').innerHTML = `<strong>Grand Total: ₹ ${parseFloat(data.grand_total).toFixed(2)}</strong>`;
                currentStartDate = data.start_date;
                currentEndDate = data.end_date;
            })
            .catch(err => {
                document.getElementById('reportBody').innerHTML = '<tr><td colspan="4" class="loading">Error loading report</td></tr>';
                console.error(err);
            });
    }

    function downloadExcel() {
        const period = currentPeriod;
        let startDate = document.getElementById('startDate').value;
        let endDate = document.getElementById('endDate').value;
        
        let url = `/admin/sales_report_download?period=${period}`;
        if (period === 'custom' && startDate && endDate) {
            url += `&start_date=${startDate}&end_date=${endDate}`;
        }
        window.location.href = url;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Filter button handlers
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentPeriod = this.dataset.period;
            if (currentPeriod !== 'custom') {
                document.getElementById('dateRangeDiv').style.opacity = '0.5';
            } else {
                document.getElementById('dateRangeDiv').style.opacity = '1';
            }
            loadReport();
        });
    });

    // Initial load
    loadReport();
</script>
</body>
</html>
